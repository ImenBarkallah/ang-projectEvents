<div class="header">
  <h1>Liste des événements</h1>

  <button mat-raised-button color="primary" (click)="openDialog()">
    <mat-icon>add</mat-icon>
    Ajouter un événement
  </button>
</div>


<mat-form-field appearance="outline">
  <mat-label>Filtrer</mat-label>
  <input matInput (keyup)="applyFilter($event)" placeholder="Rechercher..." #input>
</mat-form-field>

<div class="mat-elevation-z8">
  <table mat-table [dataSource]="dataSource" matSort>

    <!-- ID -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
      <td mat-cell *matCellDef="let row"> {{ row.id }} </td>
    </ng-container>

    <!-- Titre -->
    <ng-container matColumnDef="Titre">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Titre </th>
      <td mat-cell *matCellDef="let row"> {{ row.Titre }} </td>
    </ng-container>

    <!-- Date Debut -->
    <ng-container matColumnDef="dateDebut">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Date Début </th>
      <td mat-cell *matCellDef="let row"> {{ row.dateDebut |date}} </td>
    </ng-container>

    <!-- Date Fin -->
    <ng-container matColumnDef="dateFin">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Date Fin </th>
      <td mat-cell *matCellDef="let row"> {{ row.dateFin |date}} </td>
    </ng-container>

    <!-- Lieu -->
    <ng-container matColumnDef="lieu">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Lieu </th>
      <td mat-cell *matCellDef="let row"> {{ row.lieu }} </td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let row">
        <button mat-button color="primary" (click)="openEdit(row.id)">Edit</button>
        <button mat-button color="warn">Delete</button>
        <button mat-button color="accent">Visibility</button>
        <button mat-button color="accent">assignment_ind</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <!-- Pas de données -->
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="6">
        Aucun résultat pour "{{ input.value }}"
      </td>
    </tr>

  </table>

  <mat-paginator [pageSizeOptions]="[5,10,25,100]" showFirstLastButtons>
  </mat-paginator>
</div>
